[pytest]
# Workaround: in this environment, directories created via os.mkdir(..., 0o700)
# can become inaccessible (WinError 5), and pytest's cacheprovider uses
# tempfile.TemporaryDirectory (0o700) for atomic writes.
addopts = -p no:cacheprovider

# Speed + stability: only collect tests under ./tests by default.
# This avoids scanning large/non-code dirs (e.g. data/, node_modules/) and
# prevents PermissionError crashes when stale inaccessible dirs exist.
testpaths = tests

# Extra safety in case a user runs `pytest .` explicitly.
norecursedirs =
    .* 
    __pycache__
    node_modules
    data
    pytest-cache-files-*
    dist
    build
